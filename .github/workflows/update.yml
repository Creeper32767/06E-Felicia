name: 自动更新天气数据

on:
  schedule:
    # 每 30 分钟自动运行一次 (分钟 小时 日 月 周)
    - cron: '*/30 * * * *'
  workflow_dispatch: # 允许手动点击按钮立即运行

concurrency:
  group: weather-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write # 必须开启写入权限
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install selenium webdriver-manager

      - name: 执行更新脚本（实况 + 预警）
        continue-on-error: true
        run: |
          python auto_update/autoupdate.py

      - name: 提交并推送到仓库
        run: |
          git config user.name "WeatherBot"
          git config user.email "bot@weather.com"
          git add config.json
          if [ -f logs/err.log ]; then
            git add logs/err.log
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto Update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || exit 0
          git push origin HEAD:${{ github.ref_name }}
